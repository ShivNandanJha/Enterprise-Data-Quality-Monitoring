rules:

  - type: unique
    column: Order_ID
    severity: critical

  - type: not_null
    column: Customer_ID
    severity: critical

  - type: positive
    column: Order_Amount
    severity: critical

  - type: range
    column: Review_Rating
    min: 1
    max: 5
    severity: warning

  - type: range
    column: Discount_Percent
    min: 0
    max: 100
    severity: warning